# CI for Invoice-api.xhub for Shopware
#
# Runs three independent jobs in parallel on every PR / push to main and on
# every published release:
#   - test     PHPUnit on PHP 8.2 and 8.3 (matrix)
#   - validate shopware-cli extension validate (the same tool the Marketplace reviewer uses)
#   - phpstan  Static analysis at level 8 with Shopware Core types resolved via composer require --dev
#
# Notes
# -----
# * The plugin's composer.json intentionally does NOT carry shopware/core as a
#   require-dev — the Marketplace ZIP must stay free of dev dependencies.
#   The phpstan job adds it on the fly via `composer require --dev --no-update`.
# * `phpstan.neon` references `/var/www/html/vendor/autoload.php` (the dockware
#   container path) for local runs. In CI we override that bootstrap to the
#   runner-local `vendor/autoload.php` via `--bootstrap-file`.
# * If the phpstan job ever proves brittle in CI (Shopware Core has occasional
#   PHP-extension requirements that are not in the default ubuntu-latest image),
#   it can be temporarily disabled — the test + validate jobs still gate PRs.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2

      - name: Cache composer vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=never

  validate:
    name: shopware-cli extension validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shopware-cli
        run: |
          curl -sSL https://github.com/shopware/shopware-cli/releases/latest/download/shopware-cli_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin shopware-cli
          shopware-cli --version

      - name: Validate extension
        run: shopware-cli extension validate .

  phpstan:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, phpstan

      - name: Cache composer vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpstan-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-phpstan-

      - name: Install Shopware Core for PHPStan type resolution
        run: |
          composer require --dev shopware/core:^6.7 --no-update --no-scripts
          composer install --prefer-dist --no-progress --no-scripts

      - name: Generate CI PHPStan config (replaces dockware bootstrap path)
        run: |
          # phpstan.neon hard-codes the dockware container autoloader path
          # (/var/www/html/vendor/autoload.php) which doesn't exist on the
          # runner. We can't `includes:` it because PHPStan merges the
          # bootstrapFiles array — instead we copy the relevant parameters
          # into a standalone CI config and point bootstrap at the runner vendor.
          cat > phpstan.ci.neon <<'EOF'
          parameters:
              level: 8
              paths:
                  - src
              treatPhpDocTypesAsCertain: false
              bootstrapFiles:
                  - vendor/autoload.php
              ignoreErrors:
                  -
                      message: '#Method Xhubio\\InvoiceApiXhub\\Service\\InvoiceGenerator::clearCustomFields\(\) is unused\.#'
                      path: src/Service/InvoiceGenerator.php
          EOF

      - name: Run PHPStan
        run: |
          vendor/bin/phpstan analyse src/ \
            --configuration=phpstan.ci.neon \
            --no-progress
